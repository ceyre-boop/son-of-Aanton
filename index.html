<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Son of Aanton v3</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Sidebar for Memory Graph (v1 Style) -->
        <aside class="memory-panel">
            <h2>Aanton's Mind</h2>
            
            <div id="memory-graph"></div>
            
            <div class="stats">
                <div class="stat">
                    <span class="label">Interactions:</span>
                    <span id="interaction-count">0</span>
                </div>
                <div class="stat">
                    <span class="label">Mood:</span>
                    <span id="mood">curious</span>
                </div>
                <div class="stat">
                    <span class="label">Energy:</span>
                    <span id="energy">10/10</span>
                </div>
            </div>
            
            <div class="user-knowledge">
                <h3>What I Know About You</h3>
                <div id="user-facts">Nothing yet...</div>
            </div>
            
            <div class="traits-panel">
                <h3>Traits</h3>
                <div id="traits-viz"></div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-panel">
            <header>
                <h1>Son of Aanton <span class="version">v3</span></h1>
                <p class="subtitle">Self-learning AI with conversation memory</p>
            </header>
            
            <div id="chat-history"></div>
            
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask me anything... Try 'Who are you?' or 'What do you know about me?'">
                <button onclick="sendMessage()">Send</button>
                <button onclick="clearMemory()" class="secondary">Reset Mind</button>
            </div>
        </main>
    </div>

    <script src="aanton-v3.js"></script>
</body>
</html>
