<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Son of Aanton</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Sidebar for Memory Graph -->
        <aside class="memory-panel">
            <h2>Aanton's Mind</h2>
            <div id="memory-graph"></div>
            <div class="stats">
                <div class="stat">
                    <span class="label">Experiences:</span>
                    <span id="exp-count">0</span>
                </div>
                <div class="stat">
                    <span class="label">Mood:</span>
                    <span id="mood">curious</span>
                </div>
                <div class="stat">
                    <span class="label">Dominant Trait:</span>
                    <span id="dominant-trait">curiosity</span>
                </div>
            </div>
            <div class="traits-panel">
                <h3>Traits</h3>
                <div id="traits-viz"></div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-panel">
            <header>
                <h1>Son of Aanton</h1>
                <p class="subtitle">A self-learning AI that thinks for itself</p>
            </header>
            
            <div id="chat-history"></div>
            
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask Aanton something... (e.g., 'What should I do today?')">
                <button onclick="sendMessage()">Send</button>
                <button onclick="clearMemory()" class="secondary">Reset Mind</button>
            </div>
        </main>
    </div>

    <script src="aanton.js"></script>
</body>
</html>
